<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>카테고리 목록</title>
</head>
<body>
    <h1>카테고리 목록</h1>

    <p th:if="${successMessage}" th:text="${successMessage}"></p>
    <p th:if="${errorMessage}" th:text="${errorMessage}"></p>

    <a th:href="@{/categories/create}">+ 새 카테고리 등록</a>

    <table border="1">
        <thead>
            <tr>
                <th>ID</th>
                <th>카테고리명</th>
                <th>삭제</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="cat : ${categories}">
                <td th:text="${cat.id}">1</td>
                <td th:text="${cat.name}">카테고리명</td>
                <td>
                    <form th:action="@{/categories/{id}/delete(id=${cat.id})}" method="post">
                        <button type="submit">삭제</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>

    <hr>
    <p th:text="${'실습 수행 일시: ' + #temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss') + ' | 학번: 본인학번 | 성명: 본인이름'}"></p>
</body>
</html>
